<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperar clave - EASY SATJE</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: #0b2f5c;
      color: #172033;
      display: flex;
      font-family: Arial, Helvetica, sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 20px;
    }

    main {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
      max-width: 420px;
      padding: 24px;
      width: 100%;
    }

    h1 {
      color: #08234a;
      font-size: 24px;
      margin: 0 0 8px;
    }

    p {
      color: #5c677d;
      font-size: 14px;
      line-height: 1.45;
      margin: 0 0 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input {
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font: inherit;
      padding: 11px;
      width: 100%;
    }

    button {
      background: #08234a;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      margin-top: 18px;
      padding: 11px 14px;
      width: 100%;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .message {
      color: #344054;
      font-size: 13px;
      margin-top: 14px;
    }

    .message.error {
      color: #b42318;
    }

    .message.ok {
      color: #067647;
    }
  </style>
</head>
<body>
  <main>
    <h1>Crear nueva clave</h1>
    <p>Ingresa una nueva clave para tu cuenta de EASY SATJE.</p>

    <form id="resetForm">
      <label for="password">Nueva clave</label>
      <input id="password" type="password" autocomplete="new-password" minlength="6" required />

      <label for="confirmPassword">Confirmar clave</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" minlength="6" required />

      <button id="submitButton" type="submit">Actualizar clave</button>
      <p id="message" class="message"></p>
    </form>
  </main>

  <script>
    const SUPABASE_URL = "__SUPABASE_URL__";
    const SUPABASE_ANON_KEY = "__SUPABASE_ANON_KEY__";
    const form = document.getElementById("resetForm");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const submitButton = document.getElementById("submitButton");
    const message = document.getElementById("message");

    function setMessage(text, type) {
      message.textContent = text || "";
      message.className = "message";
      if (type) message.classList.add(type);
    }

    function getRecoveryToken() {
      const params = new URLSearchParams(window.location.hash.slice(1));
      return params.get("access_token") || "";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const accessToken = getRecoveryToken();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!accessToken) {
        setMessage("El enlace de recuperacion no es valido o ya expiro. Solicita uno nuevo desde la extension.", "error");
        return;
      }

      if (password.length < 6) {
        setMessage("La clave debe tener al menos 6 caracteres.", "error");
        return;
      }

      if (password !== confirmPassword) {
        setMessage("La confirmacion de clave no coincide.", "error");
        return;
      }

      submitButton.disabled = true;
      setMessage("Actualizando clave...");

      try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: "PUT",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password })
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.msg || data.message || data.error_description || data.error || "No se pudo actualizar la clave.");
        }

        passwordInput.value = "";
        confirmPasswordInput.value = "";
        setMessage("Clave actualizada. Ya puedes volver a EASY SATJE e iniciar sesion.", "ok");
      } catch (error) {
        setMessage(error.message || "No se pudo actualizar la clave.", "error");
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
